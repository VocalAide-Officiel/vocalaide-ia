<!doctype html>
<html lang="fr">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>VocalAide IA</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
		
		<link rel="icon" type="image/png" href="https://static.wixstatic.com/media/3852f6_ec244183f7d94d7a8d513e68e877ba8d~mv2.png/v1/fit/w_2500,h_1330,al_c/3852f6_ec244183f7d94d7a8d513e68e877ba8d~mv2.png" />
		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #f3f4f6;
			}

			* { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 800px;
				margin: 0 auto;
				padding: 1rem;
				background-image: linear-gradient(rgba(255, 255, 255, 0.00), rgba(255, 255, 255, 0.85)),  
								  url('https://static.wixstatic.com/media/3852f6_5f1dcfbdbf684d14a03991dc550e5652~mv2.png/v1/fill/w_1480,h_914,al_c,q_90,usm_0.66_1.00_0.01,enc_avif,quality_auto/3852f6_5f1dcfbdbf684d14a03991dc550e5652~mv2.png');
				background-size: cover;
				background-attachment: fixed;
				background-position: center;
				background-repeat: no-repeat;
			}

			header { text-align: center; margin-bottom: 2rem; padding: 1rem 0; border-bottom: 5px solid var(--primary-color); }
			h1 { font-size: 1.5rem; color: var(--primary-color); }

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 250px);
				min-height: 400px;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
				background: white;
				margin-top: 50px;
			}

			.chat-messages { flex: 1; overflow-y: auto; padding: 1rem; background-color: var(--light-bg); }
			.message { margin-bottom: 1rem; padding: 0.75rem; border-radius: 8px; max-width: 80%; }
			.user-message { background-color: var(--user-msg-bg); align-self: flex-end; margin-left: auto; }
			.assistant-message { background-color: var(--assistant-msg-bg); align-self: flex-start; }

			.message-input { display: flex; padding: 0.75rem; border-top: 1px solid var(--border-color); background-color: white; gap: 0.5rem; }
			#user-input { flex: 1; padding: 0.75rem; border: 1px solid var(--border-color); border-radius: 4px; resize: none; min-height: 44px; }

			.btn { padding: 0.5rem 1rem; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s; }
			#send-button { background-color: var(--primary-color); color: white; }
			#report-button { background-color: #34495e; color: white; }
			
			/* --- STYLE DE LA FENÊTRE MODALE --- */
			.modal-overlay {
				display: none;
				position: fixed;
				top: 0; left: 0; width: 100%; height: 100%;
				background: rgba(0,0,0,0.5);
				z-index: 2000;
				justify-content: center;
				align-items: center;
			}
			.modal-content {
				background: white;
				padding: 2rem;
				border-radius: 12px;
				max-width: 400px;
				width: 90%;
				text-align: center;
				box-shadow: 0 10px 25px rgba(0,0,0,0.2);
			}
			.modal-content h2 { color: var(--primary-color); margin-bottom: 1rem; font-size: 1.2rem; }
			.modal-options { display: flex; flex-direction: column; gap: 10px; margin-top: 1.5rem; }
			.btn-option {
				padding: 12px;
				border: 2px solid var(--border-color);
				border-radius: 8px;
				cursor: pointer;
				background: white;
				font-weight: 600;
				transition: 0.2s;
			}
			.btn-option:hover { border-color: var(--primary-color); background: var(--user-msg-bg); }
			.btn-close-modal { margin-top: 1rem; color: var(--text-light); cursor: pointer; font-size: 0.9rem; text-decoration: underline; }

			footer { margin-top: 1rem; text-align: center; font-size: 0.85rem; color: #000; }
			.btn-aide-fixe { position: fixed; bottom: 20px; right: 20px; background-color: var(--primary-color); color: white; padding: 12px 20px; border-radius: 8px; text-decoration: none; font-weight: bold; z-index: 1000; }
		</style>
	</head>
	<body>
		<header>
			<h1>Chat VocalAide IA</h1>
			<p>Propulsé par Cloudflare Workers AI</p>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>Bonjour ! Je suis VocalAide IA, ton espace d'écoute bienveillant. Comment te sens-tu aujourd'hui ?</p>
				</div>
			</div>
			<div class="typing-indicator" id="typing-indicator">VocalAide IA réfléchit...</div>
			<div class="message-input">
				<textarea id="user-input" placeholder="Tapez ici..." rows="1" autofocus></textarea>
				<button id="send-button" class="btn">Envoyer</button>
				<button id="report-button" class="btn">📋 Rapport</button>
			</div>
		</div>

		<div id="reportModal" class="modal-overlay">
			<div class="modal-content">
				<h2>Quel type de rapport souhaitez-vous ?</h2>
				<div class="modal-options">
					<button class="btn-option" onclick="generatePDF('full')">📄 Discussion complète (Patient/IA)</button>
					<button class="btn-option" onclick="generatePDF('summary')">🧠 Résumé de mes émotions par l'IA</button>
				</div>
				<div class="btn-close-modal" onclick="closeModal()">Annuler</div>
			</div>
		</div>

		<footer>
			<p>Tout droit réservé &copy; 2022-2026 par VocalAide</p>
		</footer>

		<script src="chat.js"></script>
		<a href="https://vocalaide.org/compte/aide" class="btn-aide-fixe">Besoin d'aide humaine ?</a>

		<script>
			const modal = document.getElementById('reportModal');

			// Ouvrir la modale au clic sur le bouton Rapport
			document.getElementById('report-button').addEventListener('click', () => {
				const messages = document.querySelectorAll('.message');
				if (messages.length <= 2) {
					alert("Il n'y a pas encore assez d'échanges pour générer un rapport.");
					return;
				}
				modal.style.display = 'flex';
			});

			function closeModal() {
				modal.style.display = 'none';
			}

			// Fermer si on clique en dehors de la fenêtre blanche
			window.onclick = function(event) {
				if (event.target == modal) closeModal();
			}

			async function generatePDF(type) {
				closeModal();
				const { jsPDF } = window.jspdf;
				const doc = new jsPDF();
				const messages = document.querySelectorAll('.message');
				let y = 50;

				// Design de l'Entête (Commun)
				doc.setFillColor(246, 130, 31); 
				doc.rect(0, 0, 210, 40, 'F');
				doc.setTextColor(255, 255, 255);
				doc.setFontSize(22);
				doc.setFont("helvetica", "bold");
				doc.text(type === 'full' ? "HISTORIQUE DE SÉANCE" : "RÉSUMÉ ÉMOTIONNEL", 105, 20, { align: "center" });
				doc.setFontSize(10);
				doc.text(`Généré le : ${new Date().toLocaleString()}`, 105, 30, { align: "center" });

				doc.setTextColor(40, 40, 40);
				doc.setFontSize(11);
				doc.setFont("helvetica", "normal");

				if (type === 'full') {
					// --- OPTION 1 : TOUTE LA DISCUSSION ---
					messages.forEach((msg) => {
						const isUser = msg.classList.contains('user-message');
						const label = isUser ? "PATIENT :" : "VOCALAIDE IA :";
						const content = msg.innerText;

						if (y > 270) { doc.addPage(); y = 20; }
						doc.setFont("helvetica", "bold");
						doc.setTextColor(isUser ? 246 : 60, isUser ? 130 : 60, isUser ? 31 : 60);
						doc.text(label, 20, y);
						y += 6;
						doc.setFont("helvetica", "normal");
						doc.setTextColor(0, 0, 0);
						const splitText = doc.splitTextToSize(content, 165);
						doc.text(splitText, 25, y);
						y += (splitText.length * 5) + 7;
					});
				} else {
					// --- OPTION 2 : RÉSUMÉ ÉMOTIONNEL ---
					// Note: Normalement l'IA devrait générer ce texte via chat.js
					// Ici on simule une structure d'analyse basée sur l'échange
					doc.setFont("helvetica", "bold");
					doc.text("Analyse automatique des émotions :", 20, y);
					y += 10;
					doc.setFont("helvetica", "normal");
					const analyse = "VocalAide IA a détecté des moments de réflexion profonde. L'utilisateur semble exprimer des besoins de clarté et de soutien. Ce résumé aide à identifier les points de blocage discutés aujourd'hui.";
					const splitAnalyse = doc.splitTextToSize(analyse, 170);
					doc.text(splitAnalyse, 20, y);
					y += 30;
					doc.setFont("helvetica", "bold");
					doc.text("Derniers messages du patient pour contexte :", 20, y);
					y += 10;
					doc.setFont("helvetica", "normal");
					
					// On ne met que les messages du patient pour le psy
					messages.forEach((msg) => {
						if(msg.classList.contains('user-message')) {
							if (y > 270) { doc.addPage(); y = 20; }
							const splitMsg = doc.splitTextToSize("- " + msg.innerText, 160);
							doc.text(splitMsg, 25, y);
							y += (splitMsg.length * 6);
						}
					});
				}

				// Pied de page
				const pageCount = doc.internal.getNumberOfPages();
				for(let i = 1; i <= pageCount; i++) {
					doc.setPage(i);
					doc.setFontSize(8);
					doc.setTextColor(150);
					doc.text("Document confidentiel - vocalaide.org", 105, 290, { align: "center" });
				}

				doc.save(type === 'full' ? "Discussion_VocalAide.pdf" : "Resume_Emotions_VocalAide.pdf");
			}
		</script>
	</body>
</html>
