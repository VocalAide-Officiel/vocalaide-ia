<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>VocalAide IA</title>
		<link rel="icon" type="image/png" href="https://static.wixstatic.com/media/3852f6_ec244183f7d94d7a8d513e68e877ba8d~mv2.png/v1/fit/w_2500,h_1330,al_c/3852f6_ec244183f7d94d7a8d513e68e877ba8d~mv2.png" />
		
		<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

		<style>
			:root {
				--primary-color: #f6821f;
				--primary-hover: #e67e22;
				--light-bg: #f9fafb;
				--border-color: #e5e7eb;
				--text-color: #1f2937;
				--text-light: #6b7280;
				--user-msg-bg: #fff2e6;
				--assistant-msg-bg: #f3f4f6;
			}

			* { box-sizing: border-box; margin: 0; padding: 0; }

			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
				line-height: 1.6;
				color: var(--text-color);
				max-width: 800px;
				margin: 0 auto;
				padding: 1rem;
				background-image: linear-gradient(rgba(255, 255, 255, 0.00), rgba(255, 255, 255, 0.85)), 
				url('https://scontent-yyz1-1.xx.fbcdn.net/v/t39.30808-6/504456449_122107993778891724_6806407475622829072_n.jpg?_nc_cat=101&ccb=1-7&_nc_sid=53a332&_nc_ohc=L07Lc8pLZy8Q7kNvwFgNAB1&_nc_oc=Adp1xqmJJifXROGGrNV1WXNKvNw4o6PInnzDxY9ri9-AXUZz_5LSvXx45gRx6R-_mGk&_nc_zt=23&_nc_ht=scontent-yyz1-1.xx&_nc_gid=1hWS81IUXIC40ntOvN0-sQ&_nc_ss=7b2a8&oh=00_Af15newSodAcTMcFFMTscIolYGfC9BjvrExFVpHy2uUfhg&oe=69F20C91');
				background-size: cover;
				background-attachment: fixed;
				background-position: center;
				background-repeat: no-repeat;
			}

			header {
				text-align: center;
				margin-bottom: 2rem;
				padding: 1rem 0;
				border-bottom: 5px solid var(--primary-color);
			}

			h1 { font-size: 1.5rem; color: var(--primary-color); }

			.chat-container {
				display: flex;
				flex-direction: column;
				height: calc(100vh - 200px);
				min-height: 400px;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				overflow: hidden;
			}

			.chat-messages {
				flex: 1;
				overflow-y: auto;
				padding: 1rem;
				background-color: var(--light-bg);
				display: flex;
				flex-direction: column;
			}

			.message {
				margin-bottom: 1rem;
				padding: 0.75rem;
				border-radius: 8px;
				max-width: 80%;
			}

			.user-message { background-color: var(--user-msg-bg); align-self: flex-end; margin-left: auto; }
			.assistant-message { background-color: var(--assistant-msg-bg); align-self: flex-start; }

			.message-input {
				display: flex;
				padding: 0.75rem;
				border-top: 1px solid var(--border-color);
				background-color: white;
			}

			#user-input {
				flex: 1;
				padding: 0.75rem;
				border: 1px solid var(--border-color);
				border-radius: 4px;
				resize: none;
			}

			#send-button {
				margin-left: 0.5rem;
				padding: 0 1rem;
				background-color: var(--primary-color);
				color: white;
				border: none;
				border-radius: 4px;
				cursor: pointer;
			}

			footer { margin-top: 1rem; text-align: center; font-size: 0.85rem; color: #000000; }

			/* Bouton Aide (Droite) */
			.btn-aide-fixe {
				position: fixed; bottom: 20px; right: 20px;
				background-color: var(--primary-color); color: white;
				padding: 12px 20px; border-radius: 8px;
				text-decoration: none; font-weight: bold;
				z-index: 1000;
			}

			/* Bouton Rapport (Gauche) */
			#report-btn {
				position: fixed; bottom: 20px; left: 20px;
				background-color: #000000; color: white;
				padding: 12px 20px; border-radius: 8px;
				border: none; cursor: pointer; font-weight: bold;
				z-index: 1000;
			}

			@media (max-width: 600px) {
				.btn-aide-fixe, #report-btn { bottom: 10px; padding: 8px 15px; font-size: 0.7rem; }
				.btn-aide-fixe { right: 10px; }
				#report-btn { left: 10px; }
				footer { padding-bottom: 60px; }
			}
		</style>
	</head>
	<body>
		<header>
			<h1>Chat VocalAide IA</h1>
		</header>

		<div class="chat-container">
			<div id="chat-messages" class="chat-messages">
				<div class="message assistant-message">
					<p>Bonjour ! Je suis VocalAide IA. Comment te sens-tu ?</p>
				</div>
			</div>
			<div class="message-input">
				<textarea id="user-input" placeholder="Tapez ici..."></textarea>
				<button id="send-button">Envoyer</button>
			</div>
		</div>

		<footer><p>Tout droit réservé &copy; 2022-2026 par VocalAide</p></footer>

		<button id="report-btn">Générer Rapport PDF</button>
		<a href="https://vocalaide.org/compte/aide" class="btn-aide-fixe">Besoin d'aide humaine ?</a>

		<script>
			// Répare l'envoi du bouton
			document.getElementById('send-button').onclick = function() {
				const input = document.getElementById('user-input');
				if (input.value.trim() !== "") {
					const div = document.createElement('div');
					div.className = 'message user-message';
					div.innerHTML = `<p>${input.value}</p>`;
					document.getElementById('chat-messages').appendChild(div);
					input.value = "";
					// Ici, chat.js prendra le relais pour la réponse de l'IA
				}
			};

			// Logique PDF simple
			document.getElementById('report-btn').onclick = function() {
				const { jsPDF } = window.jspdf;
				const doc = new jsPDF();
				let y = 20;
				doc.text("Rapport VocalAide IA - vocalaide.org", 20, y);
				y += 15;
				document.querySelectorAll('.message').forEach(m => {
					const txt = (m.classList.contains('user-message') ? "PATIENT: " : "IA: ") + m.innerText;
					const split = doc.splitTextToSize(txt, 170);
					doc.text(split, 20, y);
					y += (split.length * 7);
				});
				doc.save("rapport.pdf");
			};
		</script>
	</body>
</html>
